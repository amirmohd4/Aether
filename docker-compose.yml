version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aether-postgres
    environment:
      POSTGRES_DB: aether_govos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aether-network

  # FastAPI Backend
  backend:
    build:
      context: .                 # Project root (where configs/, scripts/ are)
      dockerfile: backend/Dockerfile
    container_name: aether-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aether_govos
      REDIS_URL: redis://redis:6379/0
      ACTIVE_STATE: karnataka
      SECRET_KEY: aether-govos-production-secret-key
      MOCK_FAILURE: "false"
      API_RATE_LIMIT: 100
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./configs:/app/configs
      - ./scripts:/app/scripts
    networks:
      - aether-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aether-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aether-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aether-frontend
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - aether-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  aether-network:
    driver: bridge    
