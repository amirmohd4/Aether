databases:
  - name: aether-db
    plan: free
    databaseName: aether_govos

services:
  - type: web
    name: aether-backend
    runtime: docker
    repo: https://github.com/amirmohd4/Aether
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aether-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aether-redis
          type: keyvalue
          property: connectionString
    ipAllowList: []

  - type: keyvalue
    name: aether-redis
    plan: free
    ipAllowList: []

  - type: web
    name: aether-frontend
    runtime: static
    repo: https://github.com/amirmohd4/Aether
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://aether-backend.onrender.com
