# Aether GovOS - Render Blueprint Configuration

# ==============================================
# 1. Define the PostgreSQL Database
# ==============================================
databases:
  - name: aether-db
    plan: free
    databaseName: aether_govos
    user: postgres

# ==============================================
# 2. Define the Services (Backend, Redis, Frontend)
# ==============================================
services:
  # --- Backend API (FastAPI) ---
  - type: web
    name: aether-backend
    runtime: docker          # Tells Render to build from a Dockerfile
    repo: https://github.com/amirmohd4/Aether
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .         # Uses the root of your repo as the build context
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aether-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aether-redis
          type: keyvalue
          property: connectionString

  # --- Redis Cache (Key-Value Store) ---
  - type: keyvalue
    name: aether-redis
    plan: free

  # --- Frontend (React Static Site) ---
  - type: web
    name: aether-frontend
    runtime: static
    repo: https://github.com/amirmohd4/Aether
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://aether-backend.onrender.com
